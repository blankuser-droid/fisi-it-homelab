cat << 'EOF' > docker-compose.yml
services:
  mein-webserver:
    image: nginx:latest
    container_name: mein-webserver
    ports:
      - "8080:80"
    restart: always
    networks:
      - fisi-network

  meine-datenbank:
    image: postgres:15-alpine
    container_name: meine-datenbank
    environment:
      POSTGRES_USER: fisi_user
      POSTGRES_PASSWORD: fisi_secure_password
      POSTGRES_DB: fisi_db
    ports:
      - "5432:5432"
    restart: always
    networks:
      - fisi-network

  portainer-admin:
    image: portainer/portainer-ce:latest
    container_name: portainer-admin
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/var/data
    restart: always

volumes:
  portainer_data:

networks:
  fisi-network:
    driver: bridge
EOF
